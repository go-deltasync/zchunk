name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: test (${{ matrix.os }} / go${{ matrix.go }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go: ["1.22", "1.23"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          check-latest: true

      - name: Show Go version
        run: go version

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test
        shell: bash
        run: |
          go test -race -coverprofile=cover.out ./...
          go tool cover -func=cover.out | tee cover.txt
          # The CLI in cmd/ is a thin wrapper around internal/zchunk and has no
          # unit tests; we gate coverage on the library only, where the
          # format/algorithm-correctness logic lives. The threshold is 100%
          # (org-wide hard rule): every branch must be reachable from tests, or
          # the dead code is removed — the bar is never lowered.
          pkg_cov=$(go test -coverprofile=cover-pkg.out ./internal/zchunk >/dev/null 2>&1 && \
                    go tool cover -func=cover-pkg.out | tail -n 1 | awk '{print $3}' | tr -d '%')
          echo "internal/zchunk coverage: ${pkg_cov}%"
          awk -v t="$pkg_cov" 'BEGIN { exit !(t+0 >= 100.0) }' || {
            echo "::error::internal/zchunk coverage ${pkg_cov}% < 100%"; exit 1; }

      - name: Upload coverage profile
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cover-${{ matrix.os }}-go${{ matrix.go }}
          path: cover.out
          if-no-files-found: warn
